<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather AI | Giriş Yap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#f0f4f8] min-h-screen font-sans flex flex-col justify-center items-center p-6">

    <div class="max-w-md w-full text-center space-y-8">
        
        <div class="flex flex-col items-center">
            <div class="text-blue-500 text-7xl drop-shadow-md mb-4 animate-bounce" style="animation-duration: 3s;">
                <i class="fa-solid fa-cloud"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Hoş Geldin</h1>
            <p class="text-slate-500 text-sm mt-2">Kişiselleştirilmiş hava durumu deneyimi</p>
        </div>

        <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200/80 space-y-4">
            
            <div id="errorMessage" class="text-red-500 text-xs hidden font-medium bg-red-50 p-2 rounded-xl border border-red-200 text-center">
                Kullanıcı adı veya şifre hatalı!
            </div>

            <form id="loginForm" class="space-y-4" onsubmit="handleLogin(event)">
                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="text" id="username" required
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:border-blue-400 focus:bg-white transition-all text-slate-700" 
                        placeholder="Kullanıcı Adı veya E-posta">
                </div>

                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" required
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:border-blue-400 focus:bg-white transition-all text-slate-700" 
                        placeholder="Şifre">
                </div>

                <div class="text-right">
                    <a href="/forgot-password.html" class="text-xs text-blue-500 font-medium hover:underline">
                        Şifremi unuttum
                    </a>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full py-3.5 bg-blue-500 text-white rounded-2xl text-sm font-semibold shadow-lg shadow-blue-500/30 hover:bg-blue-600 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                    <span>Giriş Yap</span>
                    <i class="fa-solid fa-arrow-right-to-bracket text-xs"></i>
                </button>
            </form>
        </div>

        <p class="text-xs text-slate-400">
            Hesabın yok mu? <a href="/register.html" class="text-blue-500 font-semibold hover:underline">Kayıt Ol</a>
        </p>

    </div>

    <script src="/js/auth.js"></script>
    <script>
        if (isLoggedIn()) {
            window.location.href = '/dashboard.html';
        }

        async function handleLogin(event) {
            if (event) event.preventDefault();

            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorBox = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');

            if (errorBox) errorBox.classList.add('hidden');
            if (submitBtn) submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/token/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                const data = await response.json();

                if (response.ok && data.access && data.refresh) {
                    setTokens(data.access, data.refresh);
                    const profileResp = await authFetch(`${API_BASE}/api/profiles/me/`, { method: 'GET' });
                    if (!profileResp.ok) {
                        window.location.href = '/onboarding.html';
                        return;
                    }
                    const profileData = await profileResp.json();
                    window.location.href = profileData.is_onboarded ? '/dashboard.html' : '/onboarding.html';
                    return;
                }

                if (errorBox) {
                    errorBox.classList.remove('hidden');
                    const detail = data.detail;
                    errorBox.innerText = typeof detail === 'string'
                        ? detail
                        : 'Kullanıcı adı veya şifre hatalı.';
                }
            } catch (error) {
                console.error("Giriş hatası:", error);
                if (errorBox) {
                    errorBox.classList.remove('hidden');
                    errorBox.innerText = "Sunucuya bağlanılamadı. Django (8000) ve CORS ayarlarını kontrol edin.";
                }
            } finally {
                if (submitBtn) submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
