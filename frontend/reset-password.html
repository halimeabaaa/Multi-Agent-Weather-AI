<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather AI | Yeni Şifre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#f0f4f8] min-h-screen font-sans flex flex-col justify-center items-center p-6">

    <div class="max-w-md w-full text-center space-y-8">
        <div class="flex flex-col items-center">
            <div class="text-blue-500 text-7xl drop-shadow-md mb-4 animate-bounce" style="animation-duration: 3s;">
                <i class="fa-solid fa-cloud"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Yeni Şifre Belirle</h1>
            <p class="text-slate-500 text-sm mt-2">E-postanızdaki bağlantı ile buraya yönlendirildiniz</p>
        </div>

        <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200/80 space-y-4">
            <div id="msgBox" class="text-xs hidden font-medium p-2 rounded-xl border text-center"></div>

            <form id="resetForm" class="space-y-4" onsubmit="handleReset(event)">
                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" required minlength="8"
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:border-blue-400 focus:bg-white transition-all text-slate-700"
                        placeholder="Yeni şifre (en az 8 karakter)">
                </div>

                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
                        <i class="fa-solid fa-shield-halved"></i>
                    </span>
                    <input type="password" id="confirm_password" required minlength="8"
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:border-blue-400 focus:bg-white transition-all text-slate-700"
                        placeholder="Yeni şifre tekrar">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full py-3.5 bg-blue-500 text-white rounded-2xl text-sm font-semibold shadow-lg shadow-blue-500/30 hover:bg-blue-600 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                    <span>Şifreyi Güncelle</span>
                    <i class="fa-solid fa-check text-xs"></i>
                </button>
            </form>
        </div>

        <p class="text-xs text-slate-400">
            <a href="/login.html" class="text-blue-500 font-semibold hover:underline">Giriş sayfasına dön</a>
        </p>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('uid');
        const token = params.get('token');

        function showMsg(text, isError) {
            const box = document.getElementById('msgBox');
            box.classList.remove('hidden');
            if (isError) {
                box.className = 'text-red-600 text-xs font-medium bg-red-50 p-2 rounded-xl border border-red-200 text-center block';
            } else {
                box.className = 'text-green-600 text-xs font-medium bg-green-50 p-2 rounded-xl border border-green-200 text-center block';
            }
            box.innerText = text;
        }

        if (!uid || !token) {
            showMsg('Geçersiz sıfırlama bağlantısı. Lütfen e-postanızdaki linki kullanın.', true);
            document.getElementById('resetForm').classList.add('hidden');
        }

        async function handleReset(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/auth/password/reset/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid, token, password, confirm_password }),
                });
                const data = await response.json();

                if (response.ok) {
                    showMsg(data.message || 'Şifreniz güncellendi.', false);
                    document.getElementById('resetForm').classList.add('hidden');
                    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
                } else {
                    showMsg(data.detail || 'Şifre güncellenemedi.', true);
                    submitBtn.disabled = false;
                }
            } catch (error) {
                showMsg('Sunucuya bağlanılamadı.', true);
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
